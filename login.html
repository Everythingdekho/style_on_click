<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BODY */

body{
background:#f4f4f4;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 60px;
background:black;
}

.logo img{
border-radius:50%;
}

/* NAVBAR */

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin:0 20px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

nav ul li a:hover{
color:yellow;
}

/* PAGE HEADING */

h1{
text-align:center;
margin-top:40px;
margin-bottom:20px;
font-size:40px;
}

/* LOGIN BOX */

.login-box{
width:400px;
margin:40px auto;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* FORM */

form{
display:flex;
flex-direction:column;
}

label{
margin-top:10px;
font-weight:bold;
}

input, select{
margin-top:5px;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

/* BUTTON */

button{
margin-top:20px;
padding:10px;
background:black;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#444;
}
/* FOOTER */

footer{
background:black;
text-align:center;
padding:20px;
}

footer a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

footer a:hover{
color:yellow;
}


</style>

<body>
     <header>
        <div class="logo"><img src="logo.jpg.png" alt="" height="100px" width="100px"></div>
        
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="service.html">Our Service</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>

        </nav>
    </header>
    <h1>User Login</h1>
   
<div class="login-box">
<form action="submit">

<label for="name">Name</label>
<input id="name" type="text" placeholder="Enter Name">

<label for="phone">Phone</label>
<input id="phone" type="tel" placeholder="Enter Phone Number">

<label for="Email">E-mail</label>
<input id="Email" type="email" placeholder="Enter E-mail">

<label for="password">Password</label>
<input id="password" type="password" placeholder="Enter Password">

<label for="gender">Gender</label>
<select id="gender">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<button type="submit">Login</button>

</form>
</div>

        
 




       
    
</body>
<footer>
    <a href="" target="_blank">instagram</a>
</footer>

</html>
